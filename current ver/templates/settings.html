<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBudget - Account Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
        }
        .bg-brand { background-color: #006747; color: white; }
        .btn-brand { background-color: #006747; color: white; font-weight: 500; }
        .btn-brand:hover { background-color: #004c35; color: white; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .sponsor-logo { height: 35px; width: auto; object-fit: contain; background-color: white; padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>
   <nav class="navbar navbar-expand-lg navbar-dark bg-brand mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='TB.png') }}" alt="TrackBudget Logo" height="40" class="me-2">
            <span class="fw-bold fs-4">TrackBudget</span>
        </a>
        
        <div class="d-flex align-items-center">
            <span class="me-3 fw-medium text-white-50 d-none d-md-inline" style="font-size: 0.9rem;">Powered by Commerce Bank</span>
            <img src="{{ url_for('static', filename='commerce_logo.png') }}" alt="Commerce Bank" class="sponsor-logo">
        </div>
    </div>
</nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold" style="color: #006747;">Account Settings</h2>
                    <a href="/login" class="btn btn-outline-secondary fw-medium">Back to Dashboard</a>
                </div>

                <div class="card p-5">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Profile Information</h5>
                    
                    <form action="/update_settings" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="update-firstname" class="form-label fw-medium">First Name</label>
                                <input type="text" class="form-control" id="update-firstname" name="first_name" value="{{ user.first_name }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="update-lastname" class="form-label fw-medium">Last Name</label>
                                <input type="text" class="form-control" id="update-lastname" name="last_name" value="{{ user.last_name }}" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="update-email" class="form-label fw-medium">Email Address</label>
                            <input type="email" class="form-control" id="update-email" name="email" value="{{ user.email }}" required>
                        </div>

                        <div class="mb-4">
                            <label for="update-username" class="form-label fw-medium">Username</label>
                            <input type="text" class="form-control" id="update-username" name="username" value="{{ user.user_name }}" required>
                        </div>

                        <h5 class="fw-bold mb-4 mt-5 border-bottom pb-2">Change Password</h5>
                        
                        <div class="mb-3">
                            <label for="current-password" class="form-label fw-medium">Current Password</label>
                            <input type="password" class="form-control" id="current-password" name="current_password">
                        </div>
                        <div class="mb-4">
                            <label for="new-password" class="form-label fw-medium">New Password</label>
                            <input type="password" class="form-control" id="new-password" name="new_password">
                        </div>

                        <div class="d-flex justify-content-end mt-4">
                            <button type="submit" class="btn btn-brand px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
