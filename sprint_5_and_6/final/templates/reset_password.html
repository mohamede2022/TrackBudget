<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrackBudget - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .bg-brand { background-color: #006747; color: white; }
        .btn-brand { background-color: #006747; color: white; }
        .btn-brand:hover { background-color: #004c35; color: white; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        
        /* Upgraded wide card for the split layout */
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; max-width: 850px; width: 100%; }
        .sponsor-logo { height: 35px; background-color: white; padding: 4px; border-radius: 4px; }
        
        /* Custom styling for the Mascot side */
        .koin-bg { background-color: #e8f3ef; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 3rem 2rem; text-align: center; border-right: 1px solid #d1e7dd; }
        .koin-img { max-width: 100%; height: auto; max-height: 280px; margin-bottom: 1.5rem; object-fit: contain; drop-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-brand mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='TB.png') }}" alt="TrackBudget Logo" height="40" class="me-2">
                <span class="fw-bold fs-4">TrackBudget</span>
            </a>
            
            <div class="d-flex align-items-center">
                <span class="me-3 fw-medium text-white-50 d-none d-md-inline" style="font-size: 0.9rem;">Powered by Commerce Bank</span>
                <img src="{{ url_for('static', filename='commerce_logo.png') }}" alt="Commerce Bank" class="sponsor-logo">
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="card">
            <div class="row g-0">
                
                <div class="col-md-5 koin-bg">
                    <img src="{{ url_for('static', filename='koin_wink.png') }}" alt="Koin Winking" class="koin-img" 
                         onerror="this.src='https://placehold.co/400x400/e8f3ef/006747?text=Koin+Mascot'">
                    
                    <h5 class="fw-bold mb-2" style="color: #006747;">Oops!</h5>
                    <p class="text-muted fw-medium mb-0" style="font-size: 0.95rem; line-height: 1.5;">
                        "Forgot your password? Don't sweat it, it happens to the best of us. Let's get you back on track!"
                    </p>
                </div>

                <div class="col-md-7 p-5 d-flex flex-column justify-content-center">
                    <h3 class="mb-4 fw-bold" style="color: #006747;">Reset Password</h3>
                    
                    {% if error %}
                    <div class="alert alert-danger text-center fw-medium py-2">{{ error }}</div>
                    {% endif %}

                    <form action="/reset_password/{{ token }}" method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-medium">New Password</label>
                            <input type="password" class="form-control form-control-lg" name="new_password" placeholder="Create a new password" required>
                            <div class="form-text small mt-2">Requires 12+ characters, 1 number, and 1 symbol.</div>
                        </div>
                        
                        <button type="submit" class="btn btn-brand btn-lg w-100 mb-4 fw-medium">Update Password</button>
                    </form> 
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
