<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBudget - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 80px; padding-bottom: 40px; }
        .bg-brand { background-color: #006747; color: white; }
        .btn-brand { background-color: #006747; color: white; font-weight: 500; }
        .btn-brand:hover { background-color: #004c35; color: white; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 550px; }
        .sponsor-logo { height: 35px; width: auto; object-fit: contain; background-color: white; padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-brand fixed-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-4" href="/">TrackBudget</a>
            <div class="d-flex align-items-center">
                <span class="me-3 fw-medium text-white-50" style="font-size: 0.9rem;">Powered by Commerce Bank</span>
                <img src="{{ url_for('static', filename='commerce_logo.png') }}" alt="Commerce Bank" class="sponsor-logo">
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="card p-5">
            <h3 class="mb-4 text-center fw-bold" style="color: #006747;">Create Account</h3>
            
            <form action="/register" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="reg-firstname" class="form-label fw-medium">First Name</label>
                        <input type="text" class="form-control" id="reg-firstname" name="first_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="reg-lastname" class="form-label fw-medium">Last Name</label>
                        <input type="text" class="form-control" id="reg-lastname" name="last_name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="reg-email" class="form-label fw-medium">Email</label>
                    <input type="email" class="form-control" id="reg-email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="reg-username" class="form-label fw-medium">Username</label>
                    <input type="text" class="form-control" id="reg-username" name="username" required>
                </div>
                <div class="mb-4">
                    <label for="reg-password" class="form-label fw-medium">Password</label>
                    <input type="password" class="form-control" id="reg-password" name="password" required>
                </div>
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-outline-success py-2 fw-medium">Register</button>
                </div>
                <div class="text-center">
                    <span class="text-muted">Already have an account?</span> 
                    <a href="/" class="text-decoration-none fw-bold" style="color: #006747;">Sign in</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
