<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBudget - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 80px; padding-bottom: 40px; }
        .bg-brand { background-color: #006747; color: white; }
        .btn-brand { background-color: #006747; color: white; font-weight: 500; }
        .btn-brand:hover { background-color: #004c35; color: white; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 550px; }
        .sponsor-logo { height: 35px; width: auto; object-fit: contain; background-color: white; padding: 4px; border-radius: 4px; }

        @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
}
.error-shake {
    animation: shake 0.4s;
    border: 2px solid #dc3545 !important; /* Bootstrap red */
}




    </style>
</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-brand mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='TB.png') }}" alt="TrackBudget Logo" height="40" class="me-2">
            <span class="fw-bold fs-4">TrackBudget</span>
        </a>
        
        <div class="d-flex align-items-center">
            <span class="me-3 fw-medium text-white-50 d-none d-md-inline" style="font-size: 0.9rem;">Powered by Commerce Bank</span>
            <img src="{{ url_for('static', filename='commerce_logo.png') }}" alt="Commerce Bank" class="sponsor-logo">
        </div>
    </div>
</nav>

    <div class="container main-content">
        <div class="card p-5">
            <h3 class="mb-4 text-center fw-bold" style="color: #006747;">Create Account</h3>
            
            <form action="/register" method="POST">
                <div class="mb-3">
    <label for="reg-usertype" class="form-label fw-medium">Account Type</label>
    <select class="form-select" id="reg-usertype" name="user_type" required>
        <option value="" selected disabled>Select account type...</option>
        <option value="Default">Default</option>
        <option value="Student">Student</option>
        <option value="Business">Business</option>
    </select>
</div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="reg-firstname" class="form-label fw-medium">First Name</label>
                        <input type="text" class="form-control" id="reg-firstname" name="first_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="reg-lastname" class="form-label fw-medium">Last Name</label>
                        <input type="text" class="form-control" id="reg-lastname" name="last_name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="reg-email" class="form-label fw-medium">Email</label>
                    <input type="email" class="form-control" id="reg-email" name="email" required>
                </div>
                <div class="mb-3 position-relative">
                    <label for="reg-username" class="form-label fw-medium">Username</label>
                    <input type="text" class="form-control" id="reg-username" name="username" required>
                    <div id="user-popup" class="form-text text-danger d-none mt-1 fw-medium">
                        Username must be at least 3 characters.
                    </div>
                </div>

                <div class="mb-4 position-relative">
                    <label for="reg-password" class="form-label fw-medium">Password</label>
                    <input type="password" class="form-control" id="reg-password" name="password" required>
                    <div id="pass-popup" class="card p-3 d-none position-absolute shadow-sm" 
                         style="z-index: 100; font-size: 0.85rem; border: 1px solid #006747; width: 260px; right: 100%; top: 30px; margin-right: 15px;">
                        <div class="fw-bold mb-1" style="color: #006747;">Password Requirements:</div>
                        <div id="req-len" class="text-danger transition-colors">✗ At least 12 characters</div>
                        <div id="req-num" class="text-danger transition-colors">✗ At least 1 number</div>
                        <div id="req-sym" class="text-danger transition-colors">✗ At least 1 special symbol</div>
                    </div>
                </div>
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-outline-success py-2 fw-medium">Register</button>
                </div>
                <div class="text-center">
                    <span class="text-muted">Already have an account?</span> 
                    <a href="/" class="text-decoration-none fw-bold" style="color: #006747;">Sign in</a>
                </div>

            </form>
        </div>
    </div>



<script>
        // Username Visual Logic
        const userIn = document.getElementById('reg-username');
        const userPop = document.getElementById('user-popup');
        
        userIn.addEventListener('input', () => {
            if (userIn.value.length > 0 && userIn.value.length < 3) {
                userPop.classList.remove('d-none');
            } else {
                userPop.classList.add('d-none');
            }
        });

        // Password Visual Logic
        const passIn = document.getElementById('reg-password');
        const passPop = document.getElementById('pass-popup');
        const reqLen = document.getElementById('req-len');
        const reqNum = document.getElementById('req-num');
        const reqSym = document.getElementById('req-sym');

        passIn.addEventListener('focus', () => passPop.classList.remove('d-none'));
        passIn.addEventListener('blur', () => passPop.classList.add('d-none'));

        passIn.addEventListener('input', () => {
            const val = passIn.value;
            
            if (val.length >= 12) { reqLen.className = 'text-success fw-medium'; reqLen.innerHTML = '✓ At least 12 characters'; } 
            else { reqLen.className = 'text-danger'; reqLen.innerHTML = '✗ At least 12 characters'; }
            
            if (/\d/.test(val)) { reqNum.className = 'text-success fw-medium'; reqNum.innerHTML = '✓ At least 1 number'; } 
            else { reqNum.className = 'text-danger'; reqNum.innerHTML = '✗ At least 1 number'; }
            
            if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) { reqSym.className = 'text-success fw-medium'; reqSym.innerHTML = '✓ At least 1 special symbol'; } 
            else { reqSym.className = 'text-danger'; reqSym.innerHTML = '✗ At least 1 special symbol'; }
        });

        // --- THE FORM BLOCKING LOGIC ---
        const regForm = document.querySelector('form');
        
        regForm.addEventListener('submit', (event) => {
            const pVal = passIn.value;
            const uVal = userIn.value;
            
            const isPassValid = pVal.length >= 12 && /\d/.test(pVal) && /[!@#$%^&*(),.?":{}|<>]/.test(pVal);
            const isUserValid = uVal.length >= 3;

            if (!isPassValid || !isUserValid) {
                event.preventDefault(); 
                
                passPop.classList.remove('d-none');
                if (!isUserValid) userPop.classList.remove('d-none');

                // Add the red shake effect if password fails
                if (!isPassValid) {
                    passPop.classList.add('error-shake');
                    // Remove it after 400ms so it can trigger again on the next click
                    setTimeout(() => passPop.classList.remove('error-shake'), 400);
                }
            }
        });




        // Auto-capitalize First Name
        const firstNameIn = document.getElementById('reg-firstname');
        
        firstNameIn.addEventListener('input', function() {
            if (this.value.length > 0) {
                // Takes the first letter, capitalizes it, and adds the rest of the word back
                this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1);
            }
        });


    </script>

</body>
</html>
