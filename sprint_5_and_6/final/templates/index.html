<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBudget - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; }
        .bg-brand { background-color: #006747; color: white; }
        .btn-brand { background-color: #006747; color: white; font-weight: 500; }
        .btn-brand:hover { background-color: #004c35; color: white; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .sponsor-logo { height: 35px; width: auto; object-fit: contain; background-color: white; padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-brand mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='TB.png') }}" alt="TrackBudget Logo" height="40" class="me-2">
            <span class="fw-bold fs-4">TrackBudget</span>
        </a>
        
        <div class="d-flex align-items-center">
            <span class="me-3 fw-medium text-white-50 d-none d-md-inline" style="font-size: 0.9rem;">Powered by Commerce Bank</span>
            <img src="{{ url_for('static', filename='commerce_logo.png') }}" alt="Commerce Bank" class="sponsor-logo">
        </div>
    </div>
</nav>

    <div class="container main-content mt-5">
        <div class="card p-5">
            <h3 class="mb-4 text-center fw-bold" style="color: #006747;">Welcome Back</h3>

            {% if success %}
            <div class="alert alert-success text-center fw-medium py-2" role="alert">{{ success }}</div>
            {% endif %}

            {% if error %}
            <div class="alert alert-danger text-center fw-medium py-2" role="alert">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label for="login-username" class="form-label fw-medium">Username</label>
                    <input type="text" class="form-control" id="login-username" name="username" required>
                </div>
                <div class="mb-4">
                    <label for="login-password" class="form-label fw-medium">Password</label>
                    <input type="password" class="form-control" id="login-password" name="password" required>
                    <div class="text-end mt-1">
                        <a href="/forgot_password" class="text-decoration-none fw-medium" style="color: #006747; font-size: 0.85rem;">Forgot Password?</a>
                    </div>
                </div>
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-brand py-2">Sign In</button>
                </div>
                <div class="text-center">
                    <span class="text-muted">Don't have an account?</span> 
                    <a href="/register" class="text-decoration-none fw-bold" style="color: #006747;">Create one here</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
